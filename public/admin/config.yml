backend:
  name: github
  repo: nthkmbm43/PCC-KhonKaen
  branch: main
  base_url: https://pcc-khon-kaen.vercel.app
  auth_endpoint: api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "สินค้าและบริการ (Products)"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Slug (URL Path)", name: "slug", widget: "string"}
      - {label: "หัวข้อแบบย่อ (Short Title)", name: "shortTitle", widget: "string"}
      - {label: "หัวข้อเต็ม (Title)", name: "title", widget: "string"}
      - {label: "คำอธิบาย (Description)", name: "description", widget: "text"}
      - {label: "คำอธิบาย SEO (Meta Description)", name: "metaDescription", widget: "text"}
      - {label: "ภาพประกอบ", name: "image", widget: "image"}
      - label: "คีย์เวิร์ด SEO (Keywords)"
        name: "keywords"
        widget: "list"
      - label: "จุดเด่นของบริการ (Features)"
        name: "features"
        widget: "list"
      - label: "เนื้อหาย่อย (Sections)"
        name: "sections"
        widget: "list"
        fields:
          - {label: "รหัสส่วน (ID)", name: "id", widget: "string", required: false}
          - {label: "หัวข้อเนื้อหา (Title)", name: "title", widget: "string"}
          - {label: "รายละเอียด (Content)", name: "content", widget: "text"}
          - {label: "ภาพประกอบย่อย (Image)", name: "image", widget: "image", required: false}
          - {label: "หัวข้อย่อย (Bullets)", name: "bullets", widget: "list", required: false}

  - name: "portfolio"
    label: "ผลงาน (Portfolio)"
    folder: "src/content/portfolio"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "ชื่อโครงการ (Title)", name: "title", widget: "string"}
      - {label: "หมวดหมู่ (Category)", name: "category", widget: "string"}
      - {label: "รายละเอียดโครงการ (Description)", name: "description", widget: "text"}
      - {label: "ภาพประกอบ (Image)", name: "image", widget: "image"}
