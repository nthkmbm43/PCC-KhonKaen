<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCC Post-Tension — Content Manager</title>
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* ── Loading Screen ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: 'Inter', 'Noto Sans Thai', sans-serif; background: #0A1628; }

      #cms-loading {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #0A1628 0%, #0C2461 60%, #1A3A8F 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
        transition: opacity .6s ease;
      }
      #cms-loading.fade-out { opacity: 0; pointer-events: none; }
      .ld-logo { display: flex; align-items: center; gap: 16px; }
      .ld-icon {
        width: 52px; height: 52px; border-radius: 14px;
        background: linear-gradient(135deg, #0057FF, #60A5FA);
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; font-weight: 800; color: #fff;
        box-shadow: 0 8px 32px rgba(0,87,255,.5);
        animation: iconPulse 2s ease-in-out infinite;
      }
      @keyframes iconPulse { 0%,100%{box-shadow:0 8px 32px rgba(0,87,255,.4)} 50%{box-shadow:0 12px 48px rgba(0,87,255,.8)} }
      .ld-text h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
      .ld-text p  { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 3px; }
      .ld-spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(255,255,255,.1); border-top-color: #60A5FA; animation: spin .8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .ld-hint { font-size: 12px; color: rgba(255,255,255,.35); }
    </style>
  </head>
  <body>

    <div id="cms-loading">
      <div class="ld-logo">
        <div class="ld-icon">P</div>
        <div class="ld-text">
          <h1>PCC Post-Tension</h1>
          <p>Content Management System</p>
        </div>
      </div>
      <div class="ld-spinner"></div>
      <span class="ld-hint">กำลังโหลดระบบจัดการเนื้อหา...</span>
    </div>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
    // ─────────────────────────────────────────────────────────────────────
    //  PCC CMS Theme — SAFE CSS only (no layout/display/flex overrides)
    //  Only touches: color, background, border, border-radius, font, shadow
    // ─────────────────────────────────────────────────────────────────────
    const THEME = `
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');

      /* ── Font everywhere ── */
      #nc-root, #nc-root * {
        font-family: 'Inter', 'Noto Sans Thai', sans-serif !important;
        -webkit-font-smoothing: antialiased !important;
      }

      /* ════════════════════════════
         HEADER
      ════════════════════════════ */
      #nc-root header {
        background: linear-gradient(135deg, #0A1628 0%, #0C2461 100%) !important;
        border-bottom: 1px solid rgba(255,255,255,.08) !important;
        box-shadow: 0 2px 16px rgba(0,0,0,.3) !important;
      }
      /* All text inside header — white */
      #nc-root header, #nc-root header * {
        color: rgba(255,255,255,.9) !important;
      }
      /* Nav pill buttons (Contents / Media) */
      #nc-root header nav a,
      #nc-root header nav button {
        border-radius: 8px !important;
        transition: background .15s, color .15s !important;
      }
      #nc-root header nav a:hover,
      #nc-root header nav button:hover {
        background: rgba(255,255,255,.12) !important;
        color: #fff !important;
      }
      /* Active/selected nav item */
      #nc-root header nav a[aria-current],
      #nc-root header nav [aria-selected="true"] {
        background: rgba(255,255,255,.15) !important;
        color: #fff !important;
        font-weight: 600 !important;
      }
      /* Quick add button */
      #nc-root header button {
        background: rgba(255,255,255,.1) !important;
        border: 1px solid rgba(255,255,255,.15) !important;
        border-radius: 8px !important;
        color: #fff !important;
        font-weight: 500 !important;
        transition: background .15s !important;
      }
      #nc-root header button:hover {
        background: rgba(255,255,255,.2) !important;
      }

      /* ════════════════════════════
         SIDEBAR (Collections panel)
      ════════════════════════════ */
      #nc-root aside,
      #nc-root [role="navigation"] {
        background: #ffffff !important;
        border-right: 1px solid #E2E8F0 !important;
      }
      /* "COLLECTIONS" label */
      #nc-root aside h2,
      #nc-root [role="navigation"] h2 {
        font-size: 10px !important;
        font-weight: 700 !important;
        letter-spacing: .1em !important;
        text-transform: uppercase !important;
        color: #94A3B8 !important;
      }
      /* Nav links */
      #nc-root aside a,
      #nc-root [role="navigation"] a {
        border-radius: 10px !important;
        font-size: 13.5px !important;
        font-weight: 500 !important;
        color: #374151 !important;
        text-decoration: none !important;
        transition: background .15s, color .15s !important;
      }
      #nc-root aside a:hover,
      #nc-root [role="navigation"] a:hover {
        background: #EEF4FF !important;
        color: #0057FF !important;
      }
      #nc-root aside a[class*="active"],
      #nc-root [role="navigation"] a[class*="active"],
      #nc-root aside a[aria-current],
      #nc-root [role="navigation"] a[aria-current] {
        background: #EEF4FF !important;
        color: #0057FF !important;
        font-weight: 600 !important;
      }
      /* Sidebar search input */
      #nc-root aside input[type="text"],
      #nc-root aside input[type="search"],
      #nc-root [role="navigation"] input {
        background: #F8FAFC !important;
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 10px !important;
        color: #0F172A !important;
        font-size: 13px !important;
        transition: border-color .15s, box-shadow .15s !important;
      }
      #nc-root aside input:focus,
      #nc-root [role="navigation"] input:focus {
        border-color: #0057FF !important;
        background: #fff !important;
        box-shadow: 0 0 0 3px rgba(0,87,255,.1) !important;
        outline: none !important;
      }

      /* ════════════════════════════
         MAIN CONTENT BACKGROUND
      ════════════════════════════ */
      #nc-root main {
        background: #F1F5F9 !important;
      }

      /* ════════════════════════════
         CONTENT LIST ITEMS (cards)
      ════════════════════════════ */
      /* Target the individual list item rows */
      #nc-root [data-testid="entry-listing"] > div,
      #nc-root [data-testid="entries-container"] > div {
        background: #fff !important;
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 12px !important;
        box-shadow: 0 1px 4px rgba(0,0,0,.04) !important;
        transition: box-shadow .2s, border-color .2s, transform .2s !important;
        margin-bottom: 8px !important;
      }
      #nc-root [data-testid="entry-listing"] > div:hover,
      #nc-root [data-testid="entries-container"] > div:hover {
        box-shadow: 0 6px 20px rgba(0,87,255,.1) !important;
        border-color: #93C5FD !important;
        transform: translateY(-1px) !important;
      }

      /* Title text inside cards */
      #nc-root [data-testid="entry-listing"] h2,
      #nc-root [data-testid="entry-listing"] h3,
      #nc-root [data-testid="entries-container"] h2,
      #nc-root [data-testid="entries-container"] h3 {
        font-size: 14px !important;
        font-weight: 600 !important;
        color: #0F172A !important;
      }
      #nc-root [data-testid="entry-listing"] p,
      #nc-root [data-testid="entries-container"] p {
        font-size: 12px !important;
        color: #64748B !important;
      }

      /* ════════════════════════════
         FIX 1: FIELD LABEL CHIPS
         (the blue chip badges on editor form)
      ════════════════════════════ */
      /* Override ALL label/span inside the editor that have blue bg */
      #nc-root label,
      #nc-root label span,
      #nc-root [class*="Label"],
      #nc-root [class*="label"] {
        background: transparent !important;
        background-color: transparent !important;
        color: #374151 !important;
        font-size: 11.5px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: .07em !important;
        padding: 0 !important;
        border-radius: 0 !important;
        display: block !important;
        margin-bottom: 6px !important;
      }

      /* ════════════════════════════
         FIX 2: ALL BUTTON COLORS
         Override every dark/teal/black button
      ════════════════════════════ */
      /* Reset ALL buttons first */
      #nc-root button {
        background: #F1F5F9 !important;
        color: #374151 !important;
        border: 1.5px solid #E2E8F0 !important;
        box-shadow: none !important;
      }
      #nc-root button:hover {
        background: #E2E8F0 !important;
        border-color: #CBD5E1 !important;
        transform: none !important;
      }

      /* PRIMARY buttons — any button with darker bg from Decap */
      /* Target by position: first button / button containing text Publish/Save/Upload */
      #nc-root button[class*="primary"],
      #nc-root button[class*="Primary"],
      #nc-root button[class*="default"][class*="primary"],
      #nc-root [data-testid="publish-button"],
      #nc-root [data-testid="new-entry-button"],
      #nc-root [data-testid="upload-button"] {
        background: linear-gradient(135deg, #0057FF, #2563EB) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 3px 10px rgba(0,87,255,.3) !important;
      }
      #nc-root button[class*="primary"]:hover,
      #nc-root [data-testid="publish-button"]:hover,
      #nc-root [data-testid="new-entry-button"]:hover,
      #nc-root [data-testid="upload-button"]:hover {
        background: linear-gradient(135deg, #0046D0, #1D4ED8) !important;
        box-shadow: 0 5px 16px rgba(0,87,255,.45) !important;
        transform: translateY(-1px) !important;
      }

      /* Aggressively override any button with dark/black background */
      #nc-root button[style*="background-color: rgb(0"],
      #nc-root button[style*="background: rgb(0"],
      #nc-root button[style*="background-color: #000"],
      #nc-root button[style*="background-color: #1"],
      #nc-root button[style*="background-color: #2"] {
        background: linear-gradient(135deg, #0057FF, #2563EB) !important;
        color: #fff !important;
        border: none !important;
      }

      /* ════════════════════════════
         FIX 3: QUICK ADD DROPDOWN
      ════════════════════════════ */
      #nc-root [role="menu"],
      #nc-root ul[role="menu"],
      #nc-root [class*="dropdown"],
      #nc-root [class*="Dropdown"],
      #nc-root [class*="menu"],
      #nc-root [class*="Menu"] {
        background: #fff !important;
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 14px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.06) !important;
        padding: 6px !important;
        overflow: hidden !important;
      }
      #nc-root [role="menuitem"],
      #nc-root [class*="MenuItem"],
      #nc-root [class*="menuItem"],
      #nc-root [class*="DropdownItem"],
      #nc-root [class*="dropdownItem"] {
        font-size: 14px !important;
        font-weight: 500 !important;
        color: #1E293B !important;
        border-radius: 8px !important;
        padding: 10px 14px !important;
        transition: background .12s ease, color .12s ease !important;
        cursor: pointer !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
      #nc-root [role="menuitem"]:hover,
      #nc-root [class*="MenuItem"]:hover,
      #nc-root [class*="DropdownItem"]:hover {
        background: #EEF4FF !important;
        color: #0057FF !important;
        transform: none !important;
        box-shadow: none !important;
      }

      /* ════════════════════════════
         FIX 4: MEDIA MODAL BUTTONS
      ════════════════════════════ */
      /* Upload button — blue primary */
      #nc-root [role="dialog"] button:last-of-type,
      #nc-root [aria-label*="Upload"],
      #nc-root button[aria-label*="Upload"],
      #nc-root [data-testid*="upload"] {
        background: linear-gradient(135deg, #0057FF, #2563EB) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 3px 10px rgba(0,87,255,.3) !important;
      }
      /* Delete selected — red */
      #nc-root [aria-label*="Delete"],
      #nc-root button[aria-label*="Delete"],
      #nc-root [data-testid*="delete-selected"] {
        background: transparent !important;
        color: #EF4444 !important;
        border: 1.5px solid #FCA5A5 !important;
        box-shadow: none !important;
      }
      #nc-root [aria-label*="Delete"]:hover {
        background: #FEE2E2 !important;
        border-color: #EF4444 !important;
        transform: none !important;
      }

      /* Copy / Download — outlined secondary */
      #nc-root [aria-label*="Copy"],
      #nc-root button[aria-label*="Copy"],
      #nc-root [aria-label*="Download"],
      #nc-root button[aria-label*="Download"] {
        background: #fff !important;
        color: #374151 !important;
        border: 1.5px solid #D1D5DB !important;
        box-shadow: none !important;
      }

      /* ════════════════════════════
         FIX 5: PUBLISH AREA HEADER
         (top bar of the editor page)
      ════════════════════════════ */
      /* "Writing in X collection" bar */
      #nc-root [data-testid="editor-toolbar"],
      #nc-root header + div[class] {
        background: #fff !important;
        border-bottom: 1px solid #E2E8F0 !important;
        box-shadow: 0 1px 4px rgba(0,0,0,.04) !important;
      }
      /* "CHANGES SAVED" badge */
      #nc-root [data-testid="status-badge"],
      #nc-root span[class*="status"],
      #nc-root span[class*="saved"] {
        color: #16A34A !important;
        font-size: 12px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: .06em !important;
      }

      /* ════════════════════════════
         BUTTONS — Global base (kept)
      ════════════════════════════ */
      #nc-root button {
        font-family: 'Inter','Noto Sans Thai',sans-serif !important;
        font-size: 13.5px !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        border-radius: 9px !important;
        transition: all .18s cubic-bezier(.4,0,.2,1) !important;
        letter-spacing: -.01em !important;
      }

      /* ── "New Entry / + สินค้า" button ── */
      #nc-root [data-testid="new-entry-button"] {
        background: linear-gradient(135deg,#0057FF,#2563EB) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 3px 12px rgba(0,87,255,.35) !important;
      }
      #nc-root [data-testid="new-entry-button"]:hover {
        background: linear-gradient(135deg,#0046D0,#1D4ED8) !important;
        box-shadow: 0 5px 18px rgba(0,87,255,.5) !important;
        transform: translateY(-1px) !important;
      }

      /* ── Publish / Save ── */
      #nc-root [data-testid="publish-button"],
      #nc-root button[class*="publish"],
      #nc-root button[class*="Publish"],
      #nc-root button[class*="save"],
      #nc-root button[class*="Save"] {
        background: linear-gradient(135deg,#0057FF,#2563EB) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 3px 12px rgba(0,87,255,.35) !important;
      }
      #nc-root [data-testid="publish-button"]:hover {
        background: linear-gradient(135deg,#0046D0,#1D4ED8) !important;
        box-shadow: 0 5px 18px rgba(0,87,255,.5) !important;
        transform: translateY(-1px) !important;
      }

      /* ── Delete / Danger ── */
      #nc-root [data-testid="delete-button"],
      #nc-root button[class*="delete"],
      #nc-root button[class*="Delete"],
      #nc-root button[class*="danger"] {
        background: linear-gradient(135deg,#EF4444,#DC2626) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 3px 12px rgba(239,68,68,.3) !important;
      }
      #nc-root [data-testid="delete-button"]:hover {
        box-shadow: 0 5px 18px rgba(239,68,68,.45) !important;
        transform: translateY(-1px) !important;
      }

      /* ── Cancel / Secondary ── */
      #nc-root button[class*="cancel"],
      #nc-root button[class*="Cancel"],
      #nc-root button[class*="secondary"],
      #nc-root button[class*="ghost"] {
        background: #fff !important;
        color: #374151 !important;
        border: 1.5px solid #D1D5DB !important;
        box-shadow: 0 1px 3px rgba(0,0,0,.06) !important;
      }
      #nc-root button[class*="cancel"]:hover {
        background: #F8FAFC !important;
        border-color: #9CA3AF !important;
      }

      /* ════════════════════════════
         FORM INPUTS
      ════════════════════════════ */
      #nc-root input[type="text"],
      #nc-root input[type="email"],
      #nc-root input[type="url"],
      #nc-root input[type="number"],
      #nc-root textarea,
      #nc-root select {
        font-family: 'Inter','Noto Sans Thai',sans-serif !important;
        font-size: 14px !important;
        color: #0F172A !important;
        background: #fff !important;
        border: 1.5px solid #CBD5E1 !important;
        border-radius: 10px !important;
        box-shadow: 0 1px 2px rgba(0,0,0,.04) !important;
        transition: border-color .15s, box-shadow .15s !important;
        outline: none !important;
      }
      #nc-root input[type="text"]:focus,
      #nc-root input[type="email"]:focus,
      #nc-root input[type="url"]:focus,
      #nc-root input[type="number"]:focus,
      #nc-root textarea:focus,
      #nc-root select:focus {
        border-color: #0057FF !important;
        box-shadow: 0 0 0 3px rgba(0,87,255,.12) !important;
      }
      #nc-root label {
        font-size: 12.5px !important;
        font-weight: 600 !important;
        color: #374151 !important;
        letter-spacing: .01em !important;
      }

      /* ════════════════════════════
         EDITOR TOOLBAR (Rich Text)
      ════════════════════════════ */
      /* toolbar row inside the editor */
      #nc-root [role="toolbar"] {
        background: #F8FAFC !important;
        border-bottom: 1px solid #E2E8F0 !important;
        border-radius: 10px 10px 0 0 !important;
      }
      #nc-root [role="toolbar"] button {
        background: transparent !important;
        border: 1px solid transparent !important;
        border-radius: 6px !important;
        color: #374151 !important;
        box-shadow: none !important;
        transition: background .12s, color .12s !important;
      }
      #nc-root [role="toolbar"] button:hover {
        background: #EEF4FF !important;
        border-color: #BAD0FF !important;
        color: #0057FF !important;
        transform: none !important;
        box-shadow: none !important;
      }
      #nc-root [role="toolbar"] button[class*="active"],
      #nc-root [role="toolbar"] button[aria-pressed="true"] {
        background: #DBEAFE !important;
        color: #0057FF !important;
        border-color: #93C5FD !important;
      }

      /* ════════════════════════════
         DROPDOWNS / MENUS
      ════════════════════════════ */
      #nc-root [role="menu"],
      #nc-root [role="listbox"] {
        background: #fff !important;
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 12px !important;
        box-shadow: 0 8px 28px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.06) !important;
        overflow: hidden !important;
      }
      #nc-root [role="menuitem"],
      #nc-root [role="option"] {
        border-radius: 0 !important;
        font-size: 13.5px !important;
        font-weight: 500 !important;
        color: #374151 !important;
        transition: background .1s !important;
      }
      #nc-root [role="menuitem"]:hover,
      #nc-root [role="option"]:hover {
        background: #EEF4FF !important;
        color: #0057FF !important;
      }

      /* ════════════════════════════
         MODAL
      ════════════════════════════ */
      #nc-root [role="dialog"] {
        border-radius: 18px !important;
        box-shadow: 0 20px 60px rgba(0,0,0,.2) !important;
        border: 1px solid #E2E8F0 !important;
        overflow: hidden !important;
      }
      #nc-root [role="dialog"] h2 {
        font-size: 17px !important;
        font-weight: 700 !important;
        color: #0F172A !important;
      }

      /* ════════════════════════════
         TABS
      ════════════════════════════ */
      #nc-root [role="tab"] {
        font-size: 13.5px !important;
        font-weight: 500 !important;
        color: #64748B !important;
        border-radius: 8px !important;
        transition: background .15s, color .15s !important;
      }
      #nc-root [role="tab"]:hover { color: #0F172A !important; }
      #nc-root [role="tab"][aria-selected="true"] {
        color: #0057FF !important;
        font-weight: 600 !important;
        background: #EEF4FF !important;
      }

      /* ════════════════════════════
         NOTIFICATIONS
      ════════════════════════════ */
      #nc-root [role="alert"] {
        border-radius: 10px !important;
        font-size: 13.5px !important;
        font-weight: 500 !important;
        box-shadow: 0 6px 20px rgba(0,0,0,.12) !important;
      }

      /* ════════════════════════════
         CUSTOM SCROLLBAR
      ════════════════════════════ */
      #nc-root ::-webkit-scrollbar { width: 5px; height: 5px; }
      #nc-root ::-webkit-scrollbar-track { background: transparent; }
      #nc-root ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
      #nc-root ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

      /* ════════════════════════════
         PAGE TITLES
      ════════════════════════════ */
      #nc-root h1 {
        font-size: 22px !important;
        font-weight: 700 !important;
        color: #0F172A !important;
        letter-spacing: -.4px !important;
      }
      #nc-root h2 {
        font-size: 16px !important;
        font-weight: 600 !important;
        color: #1E293B !important;
      }
      #nc-root h3 {
        font-size: 14px !important;
        font-weight: 600 !important;
        color: #334155 !important;
      }
      #nc-root p, #nc-root span, #nc-root li {
        font-size: 13.5px !important;
        color: #374151 !important;
        line-height: 1.6 !important;
      }
      #nc-root a { text-decoration: none !important; }
    `;

    function applyTheme() {
      let style = document.getElementById('pcc-theme');
      if (!style) {
        style = document.createElement('style');
        style.id = 'pcc-theme';
        style.textContent = THEME;
        document.head.appendChild(style);
      }
    }

    applyTheme();
    new MutationObserver(applyTheme).observe(document.body, { childList: true, subtree: false });

    // Loading screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('cms-loading');
        if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.remove(), 600); }
      }, 2500);
    });
    </script>
  </body>
</html>
