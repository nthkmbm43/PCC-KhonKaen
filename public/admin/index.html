<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCC Post-Tension — Content Manager</title>
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: 'Inter', 'Noto Sans Thai', sans-serif; background: #0A1628; }

      /* ── Loading Screen ── */
      #cms-loading {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #0A1628 0%, #0C2461 60%, #1A3A8F 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
        transition: opacity .6s ease;
      }
      #cms-loading.fade-out { opacity: 0; pointer-events: none; }
      .ld-logo { display: flex; align-items: center; gap: 16px; }
      .ld-icon {
        width: 56px; height: 56px; border-radius: 16px;
        background: linear-gradient(135deg, #0057FF, #60A5FA);
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; font-weight: 800; color: #fff;
        box-shadow: 0 8px 32px rgba(0,87,255,.5);
        animation: iconPulse 2s ease-in-out infinite;
      }
      @keyframes iconPulse { 0%,100%{box-shadow:0 8px 32px rgba(0,87,255,.4)} 50%{box-shadow:0 12px 48px rgba(0,87,255,.8)} }
      .ld-text h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
      .ld-text p  { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 3px; }
      .ld-spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,.1); border-top-color: #60A5FA;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .ld-hint { font-size: 13px; color: rgba(255,255,255,.35); }
    </style>
  </head>
  <body>

    <div id="cms-loading">
      <div class="ld-logo">
        <div class="ld-icon">P</div>
        <div class="ld-text">
          <h1>PCC Post-Tension</h1>
          <p>Content Management System</p>
        </div>
      </div>
      <div class="ld-spinner"></div>
      <span class="ld-hint">กำลังโหลดระบบจัดการเนื้อหา...</span>
    </div>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
    // ─────────────────────────────────────────────────────────────
    //  PCC Premium Theme for Decap CMS
    //  Strategy: inject a <style> into <head> using universal
    //  element selectors + data attrs that DON'T rely on hashed
    //  class names from styled-components.
    // ─────────────────────────────────────────────────────────────
    const CSS = `
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');

      /* ── Globals ── */
      #nc-root, #nc-root * {
        font-family: 'Inter', 'Noto Sans Thai', sans-serif !important;
      }
      #nc-root { background: #F1F5F9 !important; }

      /* ════════════════════════════════
         1. HEADER / TOP BAR
      ════════════════════════════════ */
      #nc-root header {
        background: linear-gradient(135deg,#0A1628 0%,#0C2461 100%) !important;
        box-shadow: 0 2px 20px rgba(0,0,0,.35) !important;
        border-bottom: 1px solid rgba(255,255,255,.07) !important;
        min-height: 60px !important;
        display: flex !important;
        align-items: center !important;
        padding: 0 24px !important;
      }
      #nc-root header * { color: rgba(255,255,255,.85) !important; }
      #nc-root header a { text-decoration: none !important; font-weight: 600 !important; }
      #nc-root header a:hover { color: #fff !important; }
      #nc-root header nav { display: flex !important; gap: 4px !important; align-items: center !important; }
      #nc-root header nav a {
        padding: 7px 14px !important; border-radius: 8px !important;
        font-size: 14px !important; transition: background .15s !important;
      }
      #nc-root header nav a:hover { background: rgba(255,255,255,.1) !important; }

      /* ════════════════════════════════
         2. APP LAYOUT
      ════════════════════════════════ */
      /* Main layout: sidebar + content side by side */
      #nc-root > div > div > div {
        background: #F1F5F9 !important;
      }

      /* ════════════════════════════════
         3. SIDEBAR
      ════════════════════════════════ */
      #nc-root aside {
        background: #fff !important;
        border-right: 1px solid #E2E8F0 !important;
        padding: 20px 12px !important;
        min-width: 220px !important;
      }

      /* Sidebar headings */
      #nc-root aside h2, #nc-root aside h3 {
        font-size: 11px !important;
        font-weight: 700 !important;
        letter-spacing: .08em !important;
        text-transform: uppercase !important;
        color: #94A3B8 !important;
        padding: 6px 10px !important;
        margin-bottom: 4px !important;
      }

      /* Sidebar links */
      #nc-root aside a {
        display: flex !important;
        align-items: center !important;
        padding: 9px 12px !important;
        border-radius: 10px !important;
        font-size: 14px !important;
        font-weight: 500 !important;
        color: #334155 !important;
        text-decoration: none !important;
        transition: all .15s ease !important;
        margin-bottom: 2px !important;
        gap: 8px !important;
      }
      #nc-root aside a:hover {
        background: #EEF4FF !important;
        color: #0057FF !important;
      }
      #nc-root aside a[aria-current="page"],
      #nc-root aside a[class*="active"] {
        background: linear-gradient(135deg,#EEF4FF,#DBEAFE) !important;
        color: #0057FF !important;
        font-weight: 600 !important;
        box-shadow: inset 3px 0 0 #0057FF !important;
      }

      /* Search input inside sidebar */
      #nc-root aside input {
        width: 100% !important;
        background: #F8FAFC !important;
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 10px !important;
        padding: 9px 12px 9px 36px !important;
        font-size: 14px !important;
        color: #0F172A !important;
        outline: none !important;
        margin-bottom: 12px !important;
        transition: border-color .15s, box-shadow .15s !important;
      }
      #nc-root aside input:focus {
        border-color: #0057FF !important;
        background: #fff !important;
        box-shadow: 0 0 0 3px rgba(0,87,255,.1) !important;
      }

      /* ════════════════════════════════
         4. MAIN CONTENT AREA
      ════════════════════════════════ */
      #nc-root main {
        background: #F1F5F9 !important;
        padding: 28px 32px !important;
      }

      /* Page / Section titles */
      #nc-root main h1 {
        font-size: 24px !important;
        font-weight: 700 !important;
        color: #0F172A !important;
        letter-spacing: -.5px !important;
        margin-bottom: 6px !important;
      }
      #nc-root main h2 {
        font-size: 18px !important;
        font-weight: 700 !important;
        color: #1E293B !important;
      }
      #nc-root main h3 {
        font-size: 14px !important;
        font-weight: 600 !important;
        color: #374151 !important;
        margin-bottom: 8px !important;
      }

      /* ════════════════════════════════
         5. ENTRY LIST CARDS
      ════════════════════════════════ */
      /* Each card row in the list */
      #nc-root main ul { list-style: none !important; display: flex !important; flex-direction: column !important; gap: 10px !important; }
      #nc-root main ul li {
        background: #fff !important;
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 14px !important;
        padding: 16px 20px !important;
        box-shadow: 0 1px 4px rgba(0,0,0,.04) !important;
        cursor: pointer !important;
        transition: box-shadow .2s ease, transform .2s ease, border-color .2s ease !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
      }
      #nc-root main ul li:hover {
        box-shadow: 0 6px 20px rgba(0,87,255,.1) !important;
        border-color: #BAD0FF !important;
        transform: translateY(-1px) !important;
      }

      /* Text inside cards */
      #nc-root main ul li p, #nc-root main ul li span {
        font-size: 14px !important;
        color: #64748B !important;
      }
      #nc-root main ul li h2, #nc-root main ul li h3 {
        font-size: 15px !important;
        font-weight: 600 !important;
        color: #0F172A !important;
        margin-bottom: 0 !important;
      }

      /* ════════════════════════════════
         6. ALL BUTTONS
      ════════════════════════════════ */
      #nc-root button {
        font-family: 'Inter','Noto Sans Thai',sans-serif !important;
        font-size: 14px !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        border-radius: 10px !important;
        padding: 9px 18px !important;
        transition: all .2s cubic-bezier(.4,0,.2,1) !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
        white-space: nowrap !important;
        border: none !important;
      }

      /* Default / neutral button */
      #nc-root button {
        background: #F1F5F9 !important;
        color: #374151 !important;
        border: 1.5px solid #E2E8F0 !important;
      }
      #nc-root button:hover {
        background: #E2E8F0 !important;
        border-color: #CBD5E1 !important;
      }

      /* Detect primary buttons by text content or position */
      /* Publish / Save / Confirm — blue */
      #nc-root button[data-testid="publish-button"],
      #nc-root button[data-testid="save-button"],
      #nc-root [data-testid="publish-button"],
      #nc-root [data-testid="save-button"] {
        background: linear-gradient(135deg,#0057FF,#2563EB) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 4px 14px rgba(0,87,255,.35) !important;
      }
      #nc-root button[data-testid="publish-button"]:hover,
      #nc-root button[data-testid="save-button"]:hover {
        background: linear-gradient(135deg,#0046D0,#1D4ED8) !important;
        box-shadow: 0 6px 20px rgba(0,87,255,.5) !important;
        transform: translateY(-1px) !important;
      }

      /* Delete / Danger — red */
      #nc-root button[data-testid="delete-button"],
      #nc-root [data-testid="delete-button"] {
        background: linear-gradient(135deg,#EF4444,#DC2626) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 4px 14px rgba(239,68,68,.3) !important;
      }
      #nc-root button[data-testid="delete-button"]:hover {
        box-shadow: 0 6px 20px rgba(239,68,68,.45) !important;
        transform: translateY(-1px) !important;
      }

      /* New Entry / + button */
      #nc-root a[href$="/new"],
      #nc-root button[data-testid="new-entry"],
      #nc-root [data-testid="new-entry"] {
        background: linear-gradient(135deg,#0057FF,#60A5FA) !important;
        color: #fff !important;
        border: none !important;
        border-radius: 10px !important;
        padding: 10px 20px !important;
        font-weight: 700 !important;
        box-shadow: 0 4px 14px rgba(0,87,255,.35) !important;
        text-decoration: none !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
      }
      #nc-root a[href$="/new"]:hover { box-shadow: 0 6px 20px rgba(0,87,255,.5) !important; transform: translateY(-1px) !important; }

      /* ════════════════════════════════
         7. TOOLBAR (Editor top row)
      ════════════════════════════════ */
      /* The toolbar row at the top of the editor */
      #nc-root header + div > div:first-child,
      #nc-root [role="toolbar"] {
        background: #fff !important;
        border-bottom: 1px solid #E2E8F0 !important;
        padding: 12px 24px !important;
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        box-shadow: 0 1px 4px rgba(0,0,0,.04) !important;
      }

      /* Small icon buttons in toolbar (bold, italic, etc.) */
      #nc-root [role="toolbar"] button {
        padding: 7px 10px !important;
        border-radius: 8px !important;
        background: transparent !important;
        border: 1px solid transparent !important;
        color: #374151 !important;
        font-size: 13px !important;
      }
      #nc-root [role="toolbar"] button:hover {
        background: #EEF4FF !important;
        border-color: #BAD0FF !important;
        color: #0057FF !important;
      }
      #nc-root [role="toolbar"] button[aria-pressed="true"] {
        background: #DBEAFE !important;
        color: #0057FF !important;
        border-color: #93C5FD !important;
      }

      /* ════════════════════════════════
         8. FORM FIELDS
      ════════════════════════════════ */
      #nc-root input[type="text"],
      #nc-root input[type="email"],
      #nc-root input[type="url"],
      #nc-root input[type="number"],
      #nc-root input[type="search"],
      #nc-root textarea,
      #nc-root select {
        font-family: 'Inter','Noto Sans Thai',sans-serif !important;
        font-size: 14px !important;
        color: #0F172A !important;
        background: #fff !important;
        border: 1.5px solid #CBD5E1 !important;
        border-radius: 10px !important;
        padding: 10px 14px !important;
        width: 100% !important;
        outline: none !important;
        box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
        transition: border-color .15s ease, box-shadow .15s ease !important;
      }
      #nc-root input:focus, #nc-root textarea:focus, #nc-root select:focus {
        border-color: #0057FF !important;
        box-shadow: 0 0 0 3px rgba(0,87,255,.12) !important;
      }

      /* Labels */
      #nc-root label {
        font-size: 13px !important;
        font-weight: 600 !important;
        color: #374151 !important;
        margin-bottom: 6px !important;
        display: block !important;
        letter-spacing: .01em !important;
      }

      /* Field group wrapper */
      #nc-root fieldset {
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 12px !important;
        padding: 16px !important;
        margin-bottom: 16px !important;
      }
      #nc-root legend {
        font-size: 13px !important;
        font-weight: 700 !important;
        color: #374151 !important;
        padding: 0 8px !important;
      }

      /* ════════════════════════════════
         9. DROPDOWN MENUS
      ════════════════════════════════ */
      #nc-root [role="menu"],
      #nc-root [role="listbox"],
      #nc-root ul[role] {
        background: #fff !important;
        border: 1.5px solid #E2E8F0 !important;
        border-radius: 14px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06) !important;
        padding: 6px !important;
        overflow: hidden !important;
      }
      #nc-root [role="menuitem"],
      #nc-root [role="option"] {
        padding: 10px 14px !important;
        border-radius: 8px !important;
        font-size: 14px !important;
        font-weight: 500 !important;
        color: #374151 !important;
        cursor: pointer !important;
        transition: background .12s ease !important;
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
      }
      #nc-root [role="menuitem"]:hover,
      #nc-root [role="option"]:hover {
        background: #EEF4FF !important;
        color: #0057FF !important;
      }

      /* ════════════════════════════════
         10. MODAL / DIALOG
      ════════════════════════════════ */
      #nc-root [role="dialog"] {
        border-radius: 20px !important;
        box-shadow: 0 24px 80px rgba(0,0,0,.25) !important;
        border: 1px solid #E2E8F0 !important;
        overflow: hidden !important;
      }
      #nc-root [role="dialog"] h1,
      #nc-root [role="dialog"] h2 {
        font-size: 18px !important;
        font-weight: 700 !important;
        color: #0F172A !important;
        padding-bottom: 16px !important;
        border-bottom: 1px solid #F1F5F9 !important;
        margin-bottom: 20px !important;
      }

      /* Confirm Delete modal — make buttons clear */
      #nc-root [role="dialog"] button:last-child {
        background: linear-gradient(135deg,#EF4444,#DC2626) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 4px 14px rgba(239,68,68,.3) !important;
      }
      #nc-root [role="dialog"] button:last-child:hover {
        box-shadow: 0 6px 20px rgba(239,68,68,.45) !important;
        transform: translateY(-1px) !important;
      }
      #nc-root [role="dialog"] button:first-child {
        background: #fff !important;
        color: #374151 !important;
        border: 1.5px solid #D1D5DB !important;
      }

      /* ════════════════════════════════
         11. TABS
      ════════════════════════════════ */
      #nc-root [role="tablist"] {
        display: flex !important;
        gap: 2px !important;
        background: #F1F5F9 !important;
        border-radius: 12px !important;
        padding: 4px !important;
        border-bottom: none !important;
      }
      #nc-root [role="tab"] {
        padding: 8px 16px !important;
        border-radius: 9px !important;
        font-size: 14px !important;
        font-weight: 500 !important;
        color: #64748B !important;
        background: transparent !important;
        border: none !important;
        transition: all .15s ease !important;
        cursor: pointer !important;
      }
      #nc-root [role="tab"]:hover { color: #0F172A !important; background: rgba(255,255,255,.6) !important; }
      #nc-root [role="tab"][aria-selected="true"] {
        background: #fff !important;
        color: #0057FF !important;
        font-weight: 600 !important;
        box-shadow: 0 2px 8px rgba(0,0,0,.08) !important;
      }

      /* ════════════════════════════════
         12. NOTIFICATIONS / TOAST
      ════════════════════════════════ */
      #nc-root [role="alert"],
      #nc-root [role="status"] {
        border-radius: 12px !important;
        font-size: 14px !important;
        font-weight: 500 !important;
        padding: 14px 18px !important;
        box-shadow: 0 8px 24px rgba(0,0,0,.15) !important;
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
      }

      /* ════════════════════════════════
         13. SCROLLBAR
      ════════════════════════════════ */
      #nc-root *::-webkit-scrollbar { width: 5px; height: 5px; }
      #nc-root *::-webkit-scrollbar-track { background: transparent; }
      #nc-root *::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
      #nc-root *::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

      /* ════════════════════════════════
         14. IMAGES IN MEDIA WIDGET
      ════════════════════════════════ */
      #nc-root img {
        border-radius: 10px !important;
        max-width: 100% !important;
      }

      /* ════════════════════════════════
         15. TOGGLE SWITCH
      ════════════════════════════════ */
      #nc-root [role="switch"][aria-checked="true"] {
        background: linear-gradient(135deg,#0057FF,#2563EB) !important;
      }
      #nc-root [role="switch"] {
        border-radius: 99px !important;
        transition: background .2s ease !important;
      }

      /* ════════════════════════════════
         16. EDITOR PAGE LAYOUT
      ════════════════════════════════ */
      /* Make editor panel white card */
      #nc-root main > div > div {
        background: #fff !important;
        border-radius: 16px !important;
        border: 1px solid #E2E8F0 !important;
        box-shadow: 0 2px 8px rgba(0,0,0,.04) !important;
        padding: 28px !important;
        margin-bottom: 16px !important;
      }
      /* Prevent double-nesting the styles */
      #nc-root main > div > div > div > div {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        border-radius: 0 !important;
      }

      /* Sort by / Filter controls */
      #nc-root select {
        border-radius: 10px !important;
        padding: 8px 12px !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        color: #374151 !important;
        background: #fff !important;
        border: 1.5px solid #D1D5DB !important;
        cursor: pointer !important;
        width: auto !important;
      }
    `;

    function applyTheme() {
      if (!document.getElementById('pcc-theme')) {
        const style = document.createElement('style');
        style.id = 'pcc-theme';
        style.textContent = CSS;
        document.head.appendChild(style);
      }
    }

    // Apply immediately and watch for DOM changes
    applyTheme();
    new MutationObserver(applyTheme).observe(document.documentElement, { childList: true, subtree: true });

    // Hide loading screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('cms-loading');
        if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.remove(), 600); }
      }, 2500);
    });
    </script>
  </body>
</html>
